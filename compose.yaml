services:

  yolov5:
    build:
      context: .
      dockerfile: environments/yolov5/dockerfile
    container_name: yolov5-env
    gpus: all
    shm_size: "8gb"
    volumes:
      - .:/workspace
    command: sleep infinity

  yolov7:
    build: ./environments/yolov7
    container_name: yolov7-env
    gpus: all
    shm_size: "8gb"
    volumes:
      - .:/workspace
    command: sleep infinity